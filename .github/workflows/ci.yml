name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yamllint markdown-link-check
      
      - name: Validate YAML files
        run: |
          echo "Validating YAML files..."
          find . -name "*.yml" -o -name "*.yaml" | xargs yamllint || true
      
      - name: Validate Markdown files
        run: |
          echo "Validating Markdown files..."
          find . -name "*.md" | head -20 | xargs -I {} markdown-link-check {} || true
      
      - name: Check SKILL.md structure
        run: |
          echo "Checking SKILL.md structure..."
          for skill_dir in src/skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              echo "✅ Found SKILL.md in ${skill_dir}"
              
              # Check for YAML front matter
              if head -1 "${skill_dir}SKILL.md" | grep -q "^---"; then
                echo "   ✅ Has YAML front matter"
              else
                echo "   ❌ Missing YAML front matter"
                exit 1
              fi
              
              # Check for required fields
              if grep -q "^name:" "${skill_dir}SKILL.md"; then
                echo "   ✅ Has name field"
              else
                echo "   ❌ Missing name field"
                exit 1
              fi
              
              if grep -q "^description:" "${skill_dir}SKILL.md"; then
                echo "   ✅ Has description field"
              else
                echo "   ❌ Missing description field"
                exit 1
              fi
            fi
          done
      
      - name: Check file sizes
        run: |
          echo "Checking file sizes..."
          for skill_dir in src/skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              size=$(wc -c < "${skill_dir}SKILL.md")
              lines=$(wc -l < "${skill_dir}SKILL.md")
              echo "   ${skill_dir}SKILL.md: ${size} bytes, ${lines} lines"
              
              if [ $lines -gt 1000 ]; then
                echo "   ⚠️  Warning: SKILL.md exceeds 1000 lines"
              fi
            fi
          done
      
      - name: Validate Python syntax
        run: |
          echo "Validating Python scripts..."
          find src/skills -name "*.py" | xargs -I {} python3 -m py_compile {}
          echo "✅ All Python files have valid syntax"

  test:
    name: Test Skills
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          # TODO: Add actual tests
          echo "✅ Tests passed (placeholder)"

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create release archive
        run: |
          echo "Creating release archive..."
          tar -czvf odoo-skills-${{ github.sha }}.tar.gz src/skills/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odoo-skills
          path: odoo-skills-*.tar.gz
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy documentation
        run: |
          echo "Deploying documentation..."
          # TODO: Add actual deployment
          echo "✅ Deployment complete (placeholder)"
