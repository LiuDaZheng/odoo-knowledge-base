name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Skill
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yamllint markdownlint-cli
    
    - name: Validate YAML
      run: yamllint SKILL.md
    
    - name: Validate Markdown
      run: markdownlint SKILL.md
    
    - name: Check file size
      run: |
        size=$(wc -c < SKILL.md)
        if [ $size -gt 51200 ]; then
          echo "SKILL.md exceeds 50KB limit"
          exit 1
        fi
        echo "SKILL.md size: $size bytes"
    
    - name: Validate SKILL.md structure
      run: |
        if ! grep -q "^name:" SKILL.md; then
          echo "Missing 'name' field in frontmatter"
          exit 1
        fi
        if ! grep -q "^description:" SKILL.md; then
          echo "Missing 'description' field in frontmatter"
          exit 1
        fi
        echo "SKILL.md structure is valid"

  test:
    name: Test Scripts
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install xmlrpc
    
    - name: Syntax check
      run: |
        python -m py_compile scripts/import_accounts.py
        python -m py_compile scripts/generate_financial_reports.py
    
    - name: Run dry-run tests
      run: |
        echo "Testing import_accounts.py..."
        python scripts/import_accounts.py --help
        echo "Testing generate_financial_reports.py..."
        python scripts/generate_financial_reports.py --help

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check for secrets
      run: |
        if grep -r "api_key.*=.*['\"]" scripts/ || grep -r "password.*=.*['\"]" scripts/; then
          echo "Potential secrets found in code!"
          exit 1
        fi
        echo "No secrets detected"
    
    - name: Check file permissions
      run: |
        find scripts/ -name "*.py" -exec chmod 644 {} \;
        chmod +x scripts/*.py

  package:
    name: Package Skill
    runs-on: ubuntu-latest
    needs: [validate, test, security]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create package
      run: |
        zip -r odoo-accounting-skill.skill SKILL.md scripts/ references/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: odoo-accounting-skill
        path: odoo-accounting-skill.skill
        retention-days: 30

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: odoo-accounting-skill
    
    - name: Deploy
      run: |
        echo "Deploying to production..."
        # Add deployment logic here
        echo "Deployment complete"
